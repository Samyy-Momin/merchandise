service:
  name: merchandise-service-v12
  repository_path: services/merchandise-service-v12
  runtime: laravel12
  language: php
  php_version: "8.4"

owner:
  team: backend-platform
  squad: laravel12-microservices
  tech_lead: "@backend-platform-lead"
  slack_channel: "#backend-platform"

api:
  openapi_file: services/merchandise-service-v12/openapi.yaml
  version_prefix: /v2/merchandise
  primary_routes_file: services/merchandise-service-v12/routes/api.php
  contract_first: true

testing:
  tests_path: services/merchandise-service-v12/tests
  minimum_feature_tests: 5
  minimum_unit_tests: 5
  ci_command: "cd services/merchandise-service-v12 && php artisan test"

readiness:
  health_endpoint: /v2/merchandise/health
  readiness_endpoint: /internal/tenants/{companyId}/readiness
  metrics_endpoint: /metrics

security:
  auth_mechanism: keycloak_jwt
  tenant_context_required: true
  rbac_required: true

operations:
  runbook_path: docs/deployment-guides/DEVOPS_ENGINEER_GUIDE.md
  rollback_notes: "Rollback to previous container image and revert latest migration if needed"
  oncall_rotation: "backend-platform"