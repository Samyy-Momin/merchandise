openapi: "3.0.3"
info:
  title: OneFoodDialer Merchandise Service API
  description: |
    REST API for the Merchandise Procurement Portal.
    All endpoints require a **Keycloak Bearer** token unless stated otherwise.
    Routes are served under the `/api` prefix by Laravel.
  version: "1.0.0"
  contact:
    name: OneFoodDialer Engineering
servers:
  - url: http://localhost:8000
    description: Local development
  - url: https://kong.yourdomain.com
    description: Production (via Kong Gateway)

tags:
  - name: Auth
    description: Authentication & user info
  - name: Categories
    description: Product categories
  - name: Products
    description: Product catalogue
  - name: Orders
    description: Order placement & lifecycle
  - name: Approvals
    description: Approver workflows
  - name: Vendor
    description: Vendor fulfilment
  - name: Invoices
    description: Invoice listing & download
  - name: Addresses
    description: Buyer shipping addresses
  - name: Admin
    description: Admin product & category management

security:
  - bearerAuth: []

paths:
  # ─── Auth ──────────────────────────────────────────
  /api/me:
    get:
      tags: [Auth]
      summary: Get current user info and roles
      operationId: getMe
      responses:
        "200":
          description: User info with roles
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/KeycloakUser"
                  roles:
                    type: array
                    items:
                      type: string
                    example: ["buyer"]
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ─── Categories ────────────────────────────────────
  /api/categories:
    get:
      tags: [Categories]
      summary: List all categories
      operationId: listCategories
      responses:
        "200":
          description: Array of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ─── Products ──────────────────────────────────────
  /api/products:
    get:
      tags: [Products]
      summary: List products with filters and pagination
      operationId: listProducts
      parameters:
        - name: search
          in: query
          schema: { type: string }
          description: Search by product name (partial match)
        - name: category
          in: query
          schema: { type: integer }
          description: Filter by category ID
        - name: min
          in: query
          schema: { type: number }
          description: Minimum price
        - name: max
          in: query
          schema: { type: number }
          description: Maximum price
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: per_page
          in: query
          schema: { type: integer, default: 10, maximum: 50 }
      responses:
        "200":
          description: Paginated product list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/ProductSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/products/{id}:
    get:
      tags: [Products]
      summary: Get product details
      operationId: showProduct
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Product detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductDetail"
        "404":
          description: Product not found
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ─── Orders ────────────────────────────────────────
  /api/orders:
    get:
      tags: [Orders]
      summary: List orders (buyer sees own, approver sees all)
      operationId: listOrders
      parameters:
        - name: filter
          in: query
          schema:
            type: string
            enum: [pending, approved, in_progress, delivered, completed, issues]
      responses:
        "200":
          description: Paginated order list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Order"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Orders]
      summary: Place a new order (buyer only)
      operationId: createOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderRequest"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "422":
          description: Validation error
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/orders/{id}:
    get:
      tags: [Orders]
      summary: Get order detail
      operationId: showOrder
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Order with items, address, approvals, shipment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Order not found
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/orders/{id}/approve:
    post:
      tags: [Approvals]
      summary: Approve/reject order lines (approver only)
      operationId: approveOrder
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApproveOrderRequest"
      responses:
        "200":
          description: Order after approval
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "422":
          description: Validation error or qty exceeds remaining
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/orders/{id}/tracking:
    get:
      tags: [Orders]
      summary: Get shipment tracking info
      operationId: orderTracking
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Shipment with tracking logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shipment"

  /api/orders/{id}/full-details:
    get:
      tags: [Orders]
      summary: Get full order details with acknowledgement & issues
      operationId: orderFullDetails
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Full order breakdown
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderFullDetails"

  /api/orders/{id}/issues:
    get:
      tags: [Orders]
      summary: Get issues for an order
      operationId: orderIssues
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Array of issues
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Issue"

  /api/orders/{id}/acknowledge:
    post:
      tags: [Orders]
      summary: Submit delivery acknowledgement (buyer only)
      operationId: acknowledgeOrder
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcknowledgeRequest"
      responses:
        "200":
          description: Order with acknowledgements
        "422":
          description: Validation error

  /api/orders/{id}/issue:
    post:
      tags: [Orders]
      summary: Report issue on delivered order (buyer only)
      operationId: reportIssue
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [description]
              properties:
                description:
                  type: string
      responses:
        "200":
          description: Order refreshed
        "422":
          description: Order not in delivered status

  # ─── Approvals ─────────────────────────────────────
  /api/approvals:
    get:
      tags: [Approvals]
      summary: List approver's decisions
      operationId: listApprovals
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [approved, rejected, partial]
      responses:
        "200":
          description: Paginated approval list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Approval"

  /api/approvals/stats:
    get:
      tags: [Approvals]
      summary: Get approval stats (counts by status)
      operationId: approvalStats
      responses:
        "200":
          description: Stats object
          content:
            application/json:
              schema:
                type: object
                properties:
                  approved: { type: integer }
                  rejected: { type: integer }
                  partial: { type: integer }

  /api/approvals/{id}:
    get:
      tags: [Approvals]
      summary: Show a single approval
      operationId: showApproval
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Approval detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Approval"
        "404":
          description: Not found

  # ─── Vendor ────────────────────────────────────────
  /api/vendor/orders:
    get:
      tags: [Vendor]
      summary: List orders for vendor fulfilment
      operationId: vendorListOrders
      parameters:
        - name: filter
          in: query
          schema:
            type: string
            enum: [ready, processing, dispatched, in_transit, delivered, completed]
      responses:
        "200":
          description: Paginated orders
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Order"

  /api/vendor/orders/{id}/process:
    post:
      tags: [Vendor]
      summary: Move order to processing
      operationId: vendorProcess
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Order with shipment
        "422":
          description: Invalid status transition

  /api/vendor/orders/{id}/dispatch:
    post:
      tags: [Vendor]
      summary: Dispatch order with tracking info
      operationId: vendorDispatch
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tracking_number, courier_name]
              properties:
                tracking_number: { type: string, maxLength: 255 }
                courier_name: { type: string, maxLength: 255 }
                estimated_delivery_date: { type: string, format: date, nullable: true }
      responses:
        "200":
          description: Order with shipment
        "422":
          description: Invalid status or missing shipment

  /api/vendor/orders/{id}/transit:
    post:
      tags: [Vendor]
      summary: Mark order as in transit
      operationId: vendorTransit
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Order with shipment
        "422":
          description: Invalid status

  /api/vendor/orders/{id}/deliver:
    post:
      tags: [Vendor]
      summary: Mark order as delivered with optional per-item quantities
      operationId: vendorDeliver
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                items:
                  type: array
                  items:
                    type: object
                    required: [order_item_id, delivered_qty]
                    properties:
                      order_item_id: { type: integer }
                      delivered_qty: { type: integer, minimum: 0 }
      responses:
        "200":
          description: Order with shipment, items, and auto-created invoice
        "422":
          description: Invalid status

  # ─── Invoices ──────────────────────────────────────
  /api/invoices:
    get:
      tags: [Invoices]
      summary: List invoices (role-based visibility)
      operationId: listInvoices
      responses:
        "200":
          description: Paginated invoices
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Invoice"

  /api/invoices/by-order/{orderId}:
    get:
      tags: [Invoices]
      summary: Get invoice by order ID
      operationId: invoiceByOrder
      parameters:
        - name: orderId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Invoice detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"
        "404":
          description: Invoice not found

  /api/invoices/{orderId}/pdf:
    get:
      tags: [Invoices]
      summary: Download invoice as PDF
      operationId: invoicePdf
      parameters:
        - name: orderId
          in: path
          required: true
          schema: { type: integer }
        - name: async
          in: query
          schema: { type: boolean }
          description: If true, queues PDF generation and returns 202
      responses:
        "200":
          description: PDF file download
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "202":
          description: Queued for async generation

  /api/invoices/{orderId}/excel:
    get:
      tags: [Invoices]
      summary: Download invoice as Excel
      operationId: invoiceExcel
      parameters:
        - name: orderId
          in: path
          required: true
          schema: { type: integer }
        - name: async
          in: query
          schema: { type: boolean }
      responses:
        "200":
          description: Excel file download
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
        "202":
          description: Queued for async generation

  # ─── Addresses ─────────────────────────────────────
  /api/addresses:
    get:
      tags: [Addresses]
      summary: List buyer's addresses
      operationId: listAddresses
      responses:
        "200":
          description: Array of addresses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Address"
    post:
      tags: [Addresses]
      summary: Create new address (buyer only)
      operationId: createAddress
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddressInput"
      responses:
        "201":
          description: Address created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Address"
        "422":
          description: Validation error

  /api/addresses/{id}:
    put:
      tags: [Addresses]
      summary: Update address
      operationId: updateAddress
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddressInput"
      responses:
        "200":
          description: Updated address
    delete:
      tags: [Addresses]
      summary: Delete address
      operationId: deleteAddress
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Deleted

  # ─── Admin ─────────────────────────────────────────
  /api/admin/products:
    post:
      tags: [Admin]
      summary: Create product (admin only)
      operationId: adminCreateProduct
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminProductInput"
      responses:
        "200":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductSummary"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/admin/products/{id}:
    put:
      tags: [Admin]
      summary: Update product (admin only)
      operationId: adminUpdateProduct
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminProductInput"
      responses:
        "200":
          description: Updated product
        "403":
          $ref: "#/components/responses/Forbidden"
    delete:
      tags: [Admin]
      summary: Delete product (admin only)
      operationId: adminDeleteProduct
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Deleted
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/admin/categories:
    post:
      tags: [Admin]
      summary: Create category (admin only)
      operationId: adminCreateCategory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string, maxLength: 255 }
                slug: { type: string, maxLength: 255, nullable: true }
      responses:
        "200":
          description: Created category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "403":
          $ref: "#/components/responses/Forbidden"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Keycloak-issued JWT token

  responses:
    Unauthorized:
      description: Missing or invalid bearer token
      content:
        application/json:
          schema:
            type: object
            properties:
              message: { type: string, example: "Unauthorized: missing bearer token" }
    Forbidden:
      description: Insufficient role permissions
      content:
        application/json:
          schema:
            type: object
            properties:
              message: { type: string, example: "Forbidden: missing required role" }
              required: { type: array, items: { type: string } }
              user_roles: { type: array, items: { type: string } }

  schemas:
    KeycloakUser:
      type: object
      properties:
        sub: { type: string, description: "Keycloak user UUID" }
        preferred_username: { type: string }
        email: { type: string, format: email }
        name: { type: string }

    Category:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        slug: { type: string }

    ProductSummary:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        price: { type: number, format: float }
        image_url: { type: string, nullable: true }
        category:
          type: object
          nullable: true
          properties:
            id: { type: integer }
            name: { type: string }

    ProductDetail:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        description: { type: string, nullable: true }
        price: { type: number, format: float }
        image_url: { type: string, nullable: true }
        stock: { type: integer, nullable: true }
        category_id: { type: integer, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    OrderItem:
      type: object
      properties:
        id: { type: integer }
        order_id: { type: integer }
        product_id: { type: integer }
        qty_requested: { type: integer }
        qty_approved: { type: integer, nullable: true }
        price: { type: number, format: float }
        product:
          $ref: "#/components/schemas/ProductDetail"

    Address:
      type: object
      properties:
        id: { type: integer }
        user_id: { type: string }
        name: { type: string }
        phone: { type: string }
        address_line: { type: string }
        city: { type: string }
        state: { type: string }
        pincode: { type: string }

    AddressInput:
      type: object
      required: [name, phone, address_line, city, state, pincode]
      properties:
        name: { type: string, maxLength: 255 }
        phone: { type: string, maxLength: 20 }
        address_line: { type: string, maxLength: 255 }
        city: { type: string, maxLength: 255 }
        state: { type: string, maxLength: 255 }
        pincode: { type: string, maxLength: 12 }

    Order:
      type: object
      properties:
        id: { type: integer }
        user_id: { type: string }
        status:
          type: string
          enum:
            - pending_approval
            - partially_approved
            - approved
            - rejected
            - processing
            - dispatched
            - in_transit
            - delivered
            - partially_received
            - completed
            - issue_reported
        total_amount: { type: number, format: float }
        address_id: { type: integer, nullable: true }
        created_at: { type: string, format: date-time }
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        address:
          $ref: "#/components/schemas/Address"

    CreateOrderRequest:
      type: object
      required: [items, address_id]
      properties:
        items:
          type: array
          minItems: 1
          items:
            type: object
            required: [product_id, qty]
            properties:
              product_id: { type: integer }
              qty: { type: integer, minimum: 1 }
        address_id: { type: integer }

    ApproveOrderRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          minItems: 1
          items:
            type: object
            required: [item_id, qty_approved]
            properties:
              item_id: { type: integer, description: "OrderItem ID" }
              qty_approved: { type: integer, minimum: 0 }
        comments: { type: string, nullable: true }

    AcknowledgeRequest:
      type: object
      required: [employee_code, receiver_name, branch_manager_name, items]
      properties:
        employee_code: { type: string, maxLength: 255 }
        receiver_name: { type: string, maxLength: 255 }
        branch_manager_name: { type: string, maxLength: 255 }
        remarks: { type: string, nullable: true }
        rating: { type: integer, minimum: 1, maximum: 5, nullable: true }
        items:
          type: array
          minItems: 1
          items:
            type: object
            required: [order_item_id, received_qty, status]
            properties:
              order_item_id: { type: integer }
              received_qty: { type: integer, minimum: 0 }
              status:
                type: string
                enum: [received, not_received]
              comment: { type: string, nullable: true }

    Approval:
      type: object
      properties:
        id: { type: integer }
        order_id: { type: integer }
        approver_id: { type: string }
        status:
          type: string
          enum: [approved, rejected, partial]
        comments: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        order:
          $ref: "#/components/schemas/Order"

    Shipment:
      type: object
      properties:
        id: { type: integer }
        order_id: { type: integer }
        vendor_id: { type: string }
        status:
          type: string
          enum: [processing, dispatched, in_transit, delivered]
        tracking_number: { type: string, nullable: true }
        courier_name: { type: string, nullable: true }
        estimated_delivery_date: { type: string, format: date, nullable: true }
        logs:
          type: array
          items:
            $ref: "#/components/schemas/TrackingLog"

    TrackingLog:
      type: object
      properties:
        id: { type: integer }
        shipment_id: { type: integer }
        status: { type: string }
        message: { type: string }
        created_at: { type: string, format: date-time }

    Invoice:
      type: object
      properties:
        id: { type: integer }
        order_id: { type: integer }
        invoice_number: { type: string }
        total_amount: { type: number, format: float }
        status: { type: string }
        created_at: { type: string, format: date-time }

    Issue:
      type: object
      properties:
        id: { type: integer }
        order_id: { type: integer }
        user_id: { type: string }
        description: { type: string }
        status: { type: string, enum: [open, resolved] }
        created_at: { type: string, format: date-time }

    OrderFullDetails:
      type: object
      properties:
        order:
          type: object
          properties:
            id: { type: integer }
            user_id: { type: string }
            status: { type: string }
            total_amount: { type: number }
            created_at: { type: string, format: date-time }
        items:
          type: array
          items:
            type: object
            properties:
              product_name: { type: string }
              requested_qty: { type: integer }
              approved_qty: { type: integer }
              delivered_qty: { type: integer }
              received_qty: { type: integer }
              status: { type: string, nullable: true }
              comment: { type: string, nullable: true }
        acknowledgement:
          type: object
          nullable: true
          properties:
            employee_code: { type: string }
            receiver_name: { type: string }
            rating: { type: integer, nullable: true }
            remarks: { type: string, nullable: true }
        issues:
          type: array
          items:
            $ref: "#/components/schemas/Issue"

    AdminProductInput:
      type: object
      required: [name, price, category_id]
      properties:
        name: { type: string, maxLength: 255 }
        price: { type: number, minimum: 0 }
        category_id: { type: integer }
        description: { type: string, nullable: true }
        stock: { type: integer, minimum: 0, nullable: true }
        image_url: { type: string, maxLength: 2048, nullable: true }

    PaginatedResponse:
      type: object
      properties:
        current_page: { type: integer }
        last_page: { type: integer }
        per_page: { type: integer }
        total: { type: integer }
        next_page_url: { type: string, nullable: true }
        prev_page_url: { type: string, nullable: true }
